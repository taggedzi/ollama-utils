name: Build Release Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact_name: tz-ollama-utils-linux
            binary_name: tz-ollama-utils
            release_asset: tz-ollama-utils-linux.tar.gz
          - os: windows-2022
            artifact_name: tz-ollama-utils-windows
            binary_name: tz-ollama-utils.exe
            release_asset: tz-ollama-utils-windows.zip

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4.3.1

      - name: Set up Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.10"

      - name: Install Linux Tk runtime
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[build]

      - name: Verify tkinter support
        run: python -c "import tkinter"

      - name: Build GUI binary
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          tz_ollama_utils_gui.spec

      - name: Package release asset
        shell: bash
        run: |
          mkdir -p release
          cp README.md LICENSE release/
          cp "dist/${{ matrix.binary_name }}" release/
          cd release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            powershell -Command "Compress-Archive -Path * -DestinationPath ../${{ matrix.release_asset }}"
          else
            tar -czf "../${{ matrix.release_asset }}" *
          fi

      - name: Generate SBOM
        run: >
          cyclonedx-py environment
          --output-reproducible
          --spec-version 1.6
          --output-format JSON
          --pyproject pyproject.toml
          --output-file "${{ matrix.artifact_name }}.sbom.json"

      - name: Generate release checksums
        run: |
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          files = [
              Path("${{ matrix.release_asset }}"),
              Path("${{ matrix.artifact_name }}.sbom.json"),
          ]
          output = Path("${{ matrix.artifact_name }}.sha256")

          with output.open("w", encoding="utf-8", newline="\n") as handle:
              for path in files:
                  digest = sha256(path.read_bytes()).hexdigest()
                  handle.write(f"{digest} *{path.name}\n")
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.release_asset }}
            ${{ matrix.artifact_name }}.sbom.json
            ${{ matrix.artifact_name }}.sha256
          if-no-files-found: error

      - name: Generate build provenance attestation
        uses: actions/attest@v4.1.0
        with:
          subject-checksums: ${{ matrix.artifact_name }}.sha256

      - name: Generate SBOM attestation
        uses: actions/attest@v4.1.0
        with:
          subject-path: ${{ matrix.release_asset }}
          sbom-path: ${{ matrix.artifact_name }}.sbom.json

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            ${{ matrix.release_asset }}
            ${{ matrix.artifact_name }}.sbom.json
            ${{ matrix.artifact_name }}.sha256
